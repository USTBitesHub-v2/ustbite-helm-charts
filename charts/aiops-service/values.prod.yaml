replicaCount: 1

image:
  repository: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ustbite/aiops-service
  pullPolicy: IfNotPresent
  tag: aiops-service-v0.0.1

service:
  type: ClusterIP
  port: 8011

namespace: ustbite-ops

env:
  SERVICE_PORT: "8011"
  LOG_LEVEL: "INFO"
  AWS_REGION: "us-east-1"
  BEDROCK_MODEL_ID: "amazon.nova-lite-v1:0"
  CLUSTER_NAME: "ustbite-prod"
  GITHUB_OWNER: "GITHUB_OWNER"
  GITHUB_REPO: "ustbite-helm-charts"

secrets: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

serviceAccount:
  create: true
  name: ""
  irsaRoleArn: "arn:aws:iam::ACCOUNT_ID:role/ustbite-prod-aiops-bedrock"

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 60

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
