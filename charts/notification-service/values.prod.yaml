replicaCount: 2
image:
  repository: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ustbite/notification-service
  pullPolicy: IfNotPresent
  tag: notification-service-v0.0.5
service:
  type: ClusterIP
  port: 8006
namespace: ustbite-backend
env:
  SERVICE_NAME: ustbite-notification-service
  SERVICE_PORT: "8006"
  LOG_LEVEL: "INFO"
  FRONTEND_URL: "https://ustbites.com"
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
  irsaRoleArn: ""
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
