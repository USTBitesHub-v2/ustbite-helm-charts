replicaCount: 2
image:
  repository: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ustbite/restaurant-service
  pullPolicy: IfNotPresent
  tag: restaurant-service-v0.0.1
service:
  type: ClusterIP
  port: 8002
namespace: ustbite-backend
env:
  SERVICE_NAME: ustbite-restaurant-service
  SERVICE_PORT: "8002"
  LOG_LEVEL: "INFO"
  DATABASE_HOST: ustbite-restaurant-prod.XXXXXXXXXXXX.REGION.rds.amazonaws.com
  DATABASE_PORT: "5432"
  DATABASE_NAME: ustbite_restaurants_db
  AWS_REGION: "us-east-1"
  BEDROCK_EMBED_MODEL_ID: "amazon.titan-embed-text-v2:0"
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
  irsaRoleArn: "arn:aws:iam::ACCOUNT_ID:role/ustbite-prod-restaurant-bedrock"
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
