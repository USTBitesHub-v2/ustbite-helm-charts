apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  namespace: {{ .Values.namespace }}
data:
  SERVICE_NAME: {{ .Values.env.SERVICE_NAME }}
  SERVICE_PORT: {{ .Values.env.SERVICE_PORT | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL }}
  REDIS_TTL_SECONDS: {{ .Values.env.REDIS_TTL_SECONDS | default "3600" | quote }}
  DATABASE_HOST: {{ .Values.env.DATABASE_HOST }}
  DATABASE_PORT: {{ .Values.env.DATABASE_PORT | default "5432" | quote }}
  DATABASE_NAME: {{ .Values.env.DATABASE_NAME }}
