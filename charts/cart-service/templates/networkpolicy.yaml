apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chart.fullname" . }}-netpol
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # RDS (5432), ElastiCache Redis (6379) — AWS managed services in VPC private subnets
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
