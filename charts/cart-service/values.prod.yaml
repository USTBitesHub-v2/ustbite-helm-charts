replicaCount: 2
image:
  repository: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ustbite/cart-service
  pullPolicy: IfNotPresent
  tag: cart-service-v0.0.1
service:
  type: ClusterIP
  port: 8010
namespace: ustbite-backend
env:
  SERVICE_NAME: ustbite-cart-service
  SERVICE_PORT: "8010"
  LOG_LEVEL: "INFO"
  REDIS_TTL_SECONDS: "3600"
  DATABASE_HOST: ustbite-cart-prod.XXXXXXXXXXXX.REGION.rds.amazonaws.com
  DATABASE_PORT: "5432"
  DATABASE_NAME: ustbite_cart_db
secrets: true
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
  irsaRoleArn: ""
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
