replicaCount: 2
image:
  repository: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/ustbite/order-service
  pullPolicy: IfNotPresent
  tag: order-service-v0.0.1
service:
  type: ClusterIP
  port: 8003
namespace: ustbite-backend
env:
  SERVICE_NAME: ustbite-order-service
  SERVICE_PORT: "8003"
  LOG_LEVEL: "INFO"
  DATABASE_HOST: ustbite-order-prod.XXXXXXXXXXXX.REGION.rds.amazonaws.com
  DATABASE_PORT: "5432"
  DATABASE_NAME: ustbite_orders_db
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
  irsaRoleArn: ""
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
