apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ustbite-notification-service-prod-secret
  namespace: ustbite-backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ustbite-notification-service-prod-secret
    creationPolicy: Owner
  data:
    # notification-service has no database or Redis client (no asyncpg/sqlalchemy/redis in requirements.txt)
    # DATABASE_URL removed — /ustbite/prod/notification-service/database-url does not exist in Secrets Manager
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: /ustbite/prod/shared/rabbitmq-url
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: /ustbite/prod/notification-service/sendgrid-api-key
    - secretKey: NOTIFY_FROM_EMAIL
      remoteRef:
        key: /ustbite/prod/notification-service/notify-from-email
