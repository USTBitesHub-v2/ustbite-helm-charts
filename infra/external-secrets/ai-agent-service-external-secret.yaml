apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ustbite-ai-agent-service-prod-secret
  namespace: ustbite-backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: ustbite-ai-agent-service-prod-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: /ustbite/prod/ai-agent-service/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: /ustbite/prod/shared/redis-url
    - secretKey: RABBITMQ_URL
      remoteRef:
        key: /ustbite/prod/shared/rabbitmq-url
    - secretKey: SECRET_KEY
      remoteRef:
        key: /ustbite/prod/shared/jwt-secret-key
