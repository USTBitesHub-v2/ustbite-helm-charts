apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ops-allow-ingress-nginx
  namespace: ustbite-ops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ops-allow-dns-egress
  namespace: ustbite-ops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow egress on 443 to Bedrock API (public) and Kubernetes API server (cluster-internal on 443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ops-allow-external-egress
  namespace: ustbite-ops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
