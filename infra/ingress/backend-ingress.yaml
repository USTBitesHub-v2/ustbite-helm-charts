apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ustbite-user-auth-ingress
  namespace: ustbite-backend
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /auth/$2
spec:
  ingressClassName: nginx
  rules:
    - host: ustbites.com
      http:
        paths:
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ustbite-user-service-prod
                port:
                  number: 8001
---
