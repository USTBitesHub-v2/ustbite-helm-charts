apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Trigger: fires when a sync enters an Error or Failed terminal phase
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  # Trigger: fires when a sync succeeds (useful for confirming deploys)
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  template.app-sync-failed: |
    message: |
      :red_circle: *{{.app.metadata.name}}* deploy FAILED
      *Phase:* {{.app.status.operationState.phase}}
      *Reason:* {{.app.status.operationState.message}}
      *Repo:* <{{.app.spec.source.repoURL}}|{{.app.spec.source.repoURL}}>
      *Revision:* {{.app.status.operationState.syncResult.revision}}

  template.app-sync-succeeded: |
    message: |
      :white_check_mark: *{{.app.metadata.name}}* deployed successfully
      *Revision:* {{.app.status.operationState.syncResult.revision}}

  # Slack service — token sourced from argocd-notifications-secret key "slack-token"
  service.slack: |
    token: $slack-token
